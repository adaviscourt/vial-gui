name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Rename release assets
      run: |
        mkdir -p release
        cp artifacts/vial-linux/Vial-x86_64.AppImage release/Vial-${{ github.ref_name }}-x86_64.AppImage
        cp artifacts/vial-mac/vial-mac.dmg release/Vial-${{ github.ref_name }}.dmg
        cp artifacts/vial-win/vial-win.zip release/Vial-${{ github.ref_name }}-windows.zip
        cp artifacts/vial-win-installer/VialSetup.exe release/Vial-${{ github.ref_name }}-setup.exe
        ls -l release

    - uses: softprops/action-gh-release@v2
      with:
        files: release/*
        generate_release_notes: true
