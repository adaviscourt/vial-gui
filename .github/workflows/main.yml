name: CI

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: ./util/linux-builder/build-in-docker.sh

    - uses: actions/upload-artifact@v4
      with:
        name: vial-linux
        path: util/linux-builder/output/Vial-x86_64.AppImage

  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            deployment_target: '10.13'
          - runner: macos-14
            arch: arm64
            deployment_target: '11.0'
    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}

    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install deps
      run: uv sync --extra build --frozen

    - name: Build .app
      run: uv run pyinstaller --noconfirm --clean vial-mac.spec

    - name: Create DMG
      run: |
        brew install create-dmg
        create-dmg \
          --volname Vial \
          --window-size 500 300 \
          --icon-size 96 \
          --app-drop-link 350 150 \
          --no-internet-enable \
          vial-mac-${{ matrix.arch }}.dmg \
          dist/Vial.app

    - uses: actions/upload-artifact@v4
      with:
        name: vial-mac-${{ matrix.arch }}
        path: vial-mac-${{ matrix.arch }}.dmg

  build-win:
    runs-on: windows-2025

    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install deps
      run: uv sync --extra build --frozen

    - name: Install NSIS
      run: |
        Invoke-WebRequest "https://github.com/vial-kb/vial-deps/releases/download/v1/nsis-3.06.1-setup.exe" -UserAgent "wget" -OutFile nsis-3.06.1-setup.exe
        if ((Get-FileHash nsis-3.06.1-setup.exe -Algorithm sha256).Hash -ne "f60488a676308079bfdf6845dc7114cfd4bbff47b66be4db827b89bb8d7fdc52") { Write-Error 'SHA256 mismatch' }
        Start-Process -FilePath "nsis-3.06.1-setup.exe" -ArgumentList "/S", "/D=C:\Program Files (x86)\NSIS" -NoNewWindow -Wait

    - name: Install Visual C++ Redistributable
      run: |
        Invoke-WebRequest -Uri "https://download.microsoft.com/download/3/2/2/3224B87F-CFA0-4E70-BDA3-3DE650EFEBA5/vcredist_x64.exe" -OutFile "vcredist_x64.exe"
        Start-Process -FilePath "vcredist_x64.exe" -ArgumentList "/install", "/quiet", "/norestart" -Wait
        Remove-Item "vcredist_x64.exe"

    - name: Build .exe
      run: uv run pyinstaller --noconfirm --clean vial-win.spec

    - name: Package zip
      run: Compress-Archive -Path "dist\Vial" -DestinationPath vial-win.zip

    - uses: actions/upload-artifact@v4
      with:
        name: vial-win
        path: vial-win.zip

    - name: Create installer
      run: |
        Copy-Item -Recurse -Force dist\Vial src\installer\Vial
        Push-Location src\installer\windows
        & "C:\Program Files (x86)\NSIS\makensis.exe" /Dapp_name=Vial /Dinstaller=VialSetup.exe /Dauthor=vial Installer.nsi
        Pop-Location

    - uses: actions/upload-artifact@v4
      with:
        name: vial-win-installer
        path: src\installer\VialSetup.exe
